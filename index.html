<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Classroom Tools: Galactic Edition</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                        display: ['"Fredoka One"', 'cursive'],
                    },
                    colors: {
                        space: {
                            base: '#090a0f',
                            panel: '#151b2b',
                            card: '#1e293b',
                        },
                        neon: {
                            blue: '#00f2fe',
                            green: '#00ff87',
                            purple: '#b100ff',
                            pink: '#ff0844',
                            yellow: '#ffe53b',
                            orange: '#ff9a44'
                        }
                    },
                    boxShadow: {
                        'neon-blue': '0 0 15px rgba(0, 242, 254, 0.6), inset 0 0 10px rgba(0, 242, 254, 0.4)',
                        'neon-green': '0 0 15px rgba(0, 255, 135, 0.6), inset 0 0 10px rgba(0, 255, 135, 0.4)',
                        'neon-purple': '0 0 15px rgba(177, 0, 255, 0.6), inset 0 0 10px rgba(177, 0, 255, 0.4)',
                        'neon-pink': '0 0 15px rgba(255, 8, 68, 0.6), inset 0 0 10px rgba(255, 8, 68, 0.4)',
                        'neon-yellow': '0 0 15px rgba(255, 229, 59, 0.6), inset 0 0 10px rgba(255, 229, 59, 0.4)',
                        'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.5)',
                        'portal': '0 0 50px 10px currentColor',
                    },
                    animation: {
                        'spin-slow': 'spin 30s linear infinite',
                        'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
                        'float': 'float 4s ease-in-out infinite',
                        'pop-in': 'popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'warp': 'warp 0.5s ease-in-out',
                    },
                    keyframes: {
                        pulseGlow: {
                            '0%, 100%': { opacity: 1, transform: 'scale(1)' },
                            '50%': { opacity: 0.8, transform: 'scale(1.02)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        },
                        popIn: {
                            '0%': { transform: 'scale(0.5) translateY(30px)', opacity: '0' },
                            '100%': { transform: 'scale(1) translateY(0)', opacity: '1' },
                        },
                        warp: {
                            '0%': { transform: 'scale(1) translateY(0)', filter: 'brightness(1)' },
                            '50%': { transform: 'scale(0.8) translateY(-20px)', filter: 'brightness(2)' },
                            '100%': { transform: 'scale(1) translateY(0)', filter: 'brightness(1)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Deep Space Background */
        body {
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            color: #ffffff;
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
            overflow: hidden; margin: 0; padding: 0;
        }

        #app-container:fullscreen { width: 100vw; height: 100vh; overflow: hidden; background: #090a0f; }

        /* Starfield Effect */
        .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; transform: scale(1.5); box-shadow: 0 0 5px white; } }

        /* Futuristic Glass Panels */
        .glass-panel {
            background: rgba(21, 27, 43, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border-radius: 24px;
        }

        /* Top Nav Dock */
        .dock-item {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 10px 20px; border-radius: 16px; border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255,255,255,0.05); cursor: pointer;
            font-weight: 800; font-size: 1.2rem; color: #94a3b8;
        }
        .dock-item:hover { background: rgba(255,255,255,0.1); color: #fff; transform: translateY(-3px); }
        .dock-item.active { background: rgba(255,255,255,0.15); color: #fff; border-color: rgba(255,255,255,0.3); box-shadow: 0 0 15px rgba(255,255,255,0.2); transform: translateY(-3px); }

        /* Massive Crew ID Cards (Draggable) */
        .draggable-item { cursor: grab; } .draggable-item:active { cursor: grabbing; }
        .dragging { opacity: 0.5; transform: scale(0.9); filter: brightness(0.5); }
        
        /* TOUCH DRAGGING: Rebuilt for Hardware Acceleration and smooth 60fps */
        .touch-dragging {
            position: fixed; 
            z-index: 2147483647; 
            pointer-events: none; 
            opacity: 1; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            border-color: #00f2fe !important;
            will-change: transform; /* Promotes GPU acceleration */
            margin: 0 !important;
            top: 0; 
            left: 0;
            transform-origin: center;
        }

        /* Sci-Fi Portals */
        .portal-zone { transition: all 0.3s ease; position: relative; }
        .portal-zone::before { content: ''; position: absolute; inset: -10px; border-radius: 50%; opacity: 0; transition: opacity 0.3s; z-index: -1; }
        .dropzone-active.portal-zone::before { opacity: 0.3; }
        .dropzone.warping .portal-core { animation: warp 0.5s ease-in-out; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 12px; height: 12px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body class="h-screen min-h-screen antialiased flex flex-col p-3 md:p-5 gap-4 relative">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, onSnapshot, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global State (8 students default for the small resource classroom)
        const appState = {
            userId: null, isAuthReady: false, activeTool: 'lunchChoice',
            students: [], lunchColumns: null,
            lunchMenu: { choice1: null, choice2: null, _date: null },
            currentMenuDate: '2026-02-02',
            bracket: null, podium: null, emojiMap: {},
            timerInterval: null, audioContext: null, audioStream: null 
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { apiKey: "DEMO", projectId: "DEMO" };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'classroom-tools-sb';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const toolDisplay = document.getElementById('tool-display');
        const toolNav = document.getElementById('tool-nav');

        // Generate Starfield
        const starfield = document.getElementById('starfield');
        for(let i=0; i<100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px'; star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            star.style.animationDelay = (Math.random() * 2) + 's';
            starfield.appendChild(star);
        }

        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        }, 1000);
        
        const AVATARS = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐧','🦉','🐺','🦄','🐝','🦋','🐢','🐍','🦖','🐙','🦈','🐊','🦓','🦍','🐘','🦛','🦒','🦘','👽','👾','🤖','🚀','🛸','☄️','🪐','⭐'];
        
        const SCHOOL_MENU = {

            '2026-01-09': { c1: 'Chicken Filet Sandwich', c2: 'BBQ Sandwich', sides: ['Tater Tots', 'Baby Carrots', 'Fruit'] },
            '2026-01-12': { c1: 'Chicken & Waffles', c2: 'Yogurt & Muffin', sides: ['Broccoli Dippers', 'Tossed Salad', 'Fruit'] },
            '2026-01-13': { c1: 'French Bread Pizza', c2: 'Spicy Chicken', sides: ['Seasoned Carrots', 'Lettuce/Tomato', 'Fruit'] },
            '2026-01-14': { c1: 'Pasta w/meatsauce', c2: 'Grilled Cheese', sides: ['Steamed Broccoli', 'Seasoned Corn', 'Fruit'] },
            '2026-01-15': { c1: 'Chicken Biscuit', c2: 'Sausage Biscuit', sides: ['Sweet Potato', 'Smiles', 'Fruit'] },
            '2026-01-16': { c1: 'Hotdog', c2: 'Hamburger', sides: ['Baked Beans', 'Coleslaw', 'Fruit'] },
            '2026-01-20': { c1: 'Chicken Sandwich', c2: 'Hamburger', sides: ['Lettuce/Tomato', 'Baked Beans', 'Fruit'] },
            '2026-01-21': { c1: 'Steak Sticks', c2: 'PBJ Uncrustable', sides: ['Mashed Potatoes', 'Broccoli Dippers', 'Fruit'] },
            '2026-01-22': { c1: 'Chicken Tenders', c2: 'Corndog', sides: ['Pinto Beans', 'Celery & Carrots', 'Fruit'] },
            '2026-01-26': { c1: 'Popcorn Chicken', c2: 'Hamburger', sides: ['Seasoned Corn', 'Broccoli Dippers', 'Fruit'] },
            '2026-01-27': { c1: 'Soft Beefy Taco', c2: 'Cheese Quesadilla', sides: ['Refried Beans', 'Lettuce/Tomato', 'Fruit'] },
            '2026-01-28': { c1: 'Grilled Cheese', c2: 'PBJ Uncrustable', sides: ['Chili Bowl', 'Baked Potato', 'Baby Carrots'] },
            '2026-01-29': { c1: 'Stuffed Breadsticks', c2: 'Ham & Cheese Deli', sides: ['Broccoli & Cheese', 'Tossed Salad', 'Fruit'] },
            '2026-01-30': { c1: 'Chicken Filet Sandwich', c2: 'BBQ Sandwich', sides: ['Tater Tots', 'Baby Carrots', 'Fruit'] },
            '2026-02-02': { c1: 'Chicken & Waffles', c2: 'Yogurt & Muffin', sides: ['Broccoli Dippers', 'Tossed Salad', 'Fruit'] },
            '2026-02-03': { c1: 'French Bread Pizza', c2: 'Chicken Sandwich', sides: ['Seasoned Carrots', 'Lettuce/Tomato', 'Fruit'] },

            '2026-02-06': { c1: 'Hotdog', c2: 'Hamburger', sides: ['Baked Beans', 'Coleslaw', 'Fruit'] },

            '2026-02-10': { c1: 'Popcorn Chicken', c2: 'Ham & Cheese Wrap', sides: ['Greenbeans', 'Baby Carrots', 'Fruit'] },

            '2026-02-13': { c1: 'Chicken Tenders', c2: 'Corndog', sides: ['Pinto Beans', 'Celery & Carrots', 'Fruit'] },
            '2026-02-17': { c1: 'Soft Beefy Taco', c2: 'Mexican Pizza', sides: ['Refried Beans', 'Lettuce/Tomato', 'Baby Carrots'] },
            '2026-02-18': { c1: 'Grilled Cheese', c2: 'PBJ Uncrustable', sides: ['Chili Bowl', 'Baked Potato', 'Fruit'] },
            '2026-02-19': { c1: 'Pizza Sticks', c2: 'Hot Ham & Cheese', sides: ['Broccoli & Cheese', 'Tossed Salad', 'Fruit'] },
            '2026-02-20': { c1: 'Chicken Filet Sandwich', c2: 'BBQ Sandwich', sides: ['Tater Tots', 'Baby Carrots', 'Fruit'] },
            '2026-02-23': { c1: 'Chicken & Waffles', c2: 'Yogurt & Muffin', sides: ['Broccoli Dippers', 'Tossed Salad', 'Fruit'] },
            '2026-02-24': { c1: 'French Bread Pizza', c2: 'Chicken Sandwich', sides: ['Seasoned Carrots', 'Lettuce/Tomato', 'Fruit'] },
            '2026-02-25': { c1: 'Pasta w/meatsauce', c2: 'Grilled Cheese', sides: ['Steamed Broccoli', 'Seasoned Corn', 'Fruit'] },
            '2026-02-26': { c1: 'Chicken Biscuit', c2: 'Sausage Biscuit', sides: ['Sweet Potato', 'Smiles', 'Fruit'] },
            '2026-02-27': { c1: 'Hotdog', c2: 'Hamburger', sides: ['Baked Beans', 'Coleslaw', 'Fruit'] }
        };
        const DATES = Object.keys(SCHOOL_MENU).sort();

        function getFoodEmoji(name) {
            const n = name.toLowerCase();
            if (n.includes('pizza') || n.includes('breadsticks')) return '🍕';
            if (n.includes('waffle')) return '🧇';
            if (n.includes('pasta') || n.includes('spaghetti')) return '🍝';
            if (n.includes('taco') || n.includes('quesadilla')) return '🌮';
            if (n.includes('cheese') && (n.includes('sandwich') || n.includes('grilled'))) return '🥪';
            if (n.includes('sandwich') || n.includes('wrap') || n.includes('uncrustable')) return '🥪';
            if (n.includes('burger')) return '🍔';
            if (n.includes('hotdog') || n.includes('corndog')) return '🌭';
            if (n.includes('chicken') || n.includes('tenders')) return '🍗';
            if (n.includes('steak') || n.includes('bbq') || n.includes('meat')) return '🥩';
            if (n.includes('yogurt') || n.includes('muffin')) return '🧁';
            if (n.includes('biscuit')) return '🥐';
            if (n.includes('cheese')) return '🧀';
            return '🍱';
        }

        const MENU_OPTIONS = Array.from(new Set(Object.values(SCHOOL_MENU).flatMap(d => [d.c1, d.c2]))).sort().map(name => ({ name, emoji: getFoodEmoji(name) }));

        function getStudentEmoji(student) {
            if (appState.emojiMap[student.id]) return appState.emojiMap[student.id];
            const todayStr = new Date().toDateString();
            const seedString = student.name + todayStr;
            let hash = 0; 
            for (let i = 0; i < seedString.length; i++) { hash = seedString.charCodeAt(i) + ((hash << 5) - hash); }
            const emoji = AVATARS[Math.abs(hash) % AVATARS.length];
            appState.emojiMap[student.id] = emoji;
            return emoji;
        }

        const tools = {
            lunchChoice: { name: 'Lunch Portals', icon: 'utensils' },
            noiseMeter: { name: 'Alien Radar', icon: 'radar' },
            timer: { name: 'Hyperdrive', icon: 'timer' },
            classRoster: { name: 'Crew Manifest', icon: 'users' },
            studentSelector: { name: 'Teleporter', icon: 'zap' },
            tournamentBracket: { name: 'Galaxy Bracket', icon: 'trophy' },
        };

        function init() {
            renderNav(); setupFullscreen();
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    appState.userId = user.uid; appState.isAuthReady = true;
                    await initRoster(); setupStudentListener(); renderActiveTool();
                }
            });
            (async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                    else await signInAnonymously(auth);
                } catch (e) { fallbackToLocal(); }
            })();
            setTimeout(() => { if (!appState.isAuthReady) fallbackToLocal(); }, 3000);
        }

        function fallbackToLocal() {
            if (appState.isAuthReady) return;
            appState.isAuthReady = true;
            // Specifically scaled for 8 students by default
            appState.students = ['Skylar', 'Terrell', 'DJ', 'Joshua', 'Cody', 'Leon', 'Alisha', 'Miracle'].map((n, i) => ({ id: `loc-${i}`, name: n, isPresent: true }));
            renderActiveTool();
        }

        async function initRoster() {
            if (!appState.userId) return;
            const ref = doc(db, `artifacts/${appId}/users/${appState.userId}/settings`, 'roster');
            try {
                const snap = await getDoc(ref);
                if (!snap.exists() || !snap.data().initialized) {
                    const sRef = collection(db, `artifacts/${appId}/users/${appState.userId}/students`);
                    const defaults = ['Skylar', 'Terrell', 'DJ', 'Joshua', 'Cody', 'Leon', 'Alisha', 'Miracle'];
                    await Promise.all(defaults.map(name => addDoc(sRef, { name, isPresent: true })));
                    await setDoc(ref, { initialized: true });
                }
            } catch (e) {}
        }

        function setupStudentListener() {
            if (!appState.userId) return;
            onSnapshot(collection(db, `artifacts/${appId}/users/${appState.userId}/students`), (snap) => {
                appState.students = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.name.localeCompare(b.name));
                if (['classRoster', 'studentSelector', 'lunchChoice'].includes(appState.activeTool)) renderActiveTool();
            }, () => {});
        }

        function cleanupCurrentTool() {
            clearInterval(appState.timerInterval);
            if(appState.audioContext) { appState.audioContext.close(); appState.audioContext = null; }
            if(appState.audioStream) { appState.audioStream.getTracks().forEach(t => t.stop()); appState.audioStream = null; }
        }

        function renderNav() {
            toolNav.innerHTML = '';
            Object.entries(tools).forEach(([id, tool]) => {
                const btn = document.createElement('div');
                const isActive = appState.activeTool === id;
                btn.className = `dock-item ${isActive ? 'active' : ''}`;
                btn.innerHTML = `<i data-lucide="${tool.icon}" class="w-5 h-5"></i><span>${tool.name}</span>`;
                btn.onclick = () => { cleanupCurrentTool(); appState.activeTool = id; renderNav(); renderActiveTool(); };
                toolNav.appendChild(btn);
            });
            lucide.createIcons();
        }

        function renderActiveTool() {
            if (!appState.isAuthReady) return;
            toolDisplay.innerHTML = '';
            const toolFunc = {
                lunchChoice: renderLunchChoice, noiseMeter: renderNoiseMeter, timer: renderTimer,
                classRoster: renderClassRoster, studentSelector: renderStudentSelector, tournamentBracket: renderTournamentBracket
            }[appState.activeTool];
            if (toolFunc) toolFunc();
            lucide.createIcons();
        }

        function showModal(contentHtml) {
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `
                <div class="glass-panel p-8 max-w-5xl w-full transform transition-all animate-pop-in border border-neon-blue shadow-neon-blue relative">
                    <button id="close-modal" class="absolute -top-5 -right-5 w-14 h-14 bg-space-card border-2 border-neon-pink text-neon-pink rounded-full flex items-center justify-center hover:bg-neon-pink hover:text-white transition-colors shadow-neon-pink z-50"><i data-lucide="x" class="w-8 h-8"></i></button>
                    <div class="bg-space-base/50 rounded-2xl p-6 shadow-inner">${contentHtml}</div>
                </div>
            `;
            modal.classList.remove('hidden');
            document.getElementById('close-modal').onclick = () => modal.classList.add('hidden');
            lucide.createIcons();
        }

        // ==========================================
        // 1. SPACE PORTALS LUNCH BOARD
        // ==========================================
        function renderLunchChoice() {
            const dayData = SCHOOL_MENU[appState.currentMenuDate];
            if (!appState.lunchMenu.choice1 || appState.lunchMenu._date !== appState.currentMenuDate) {
                appState.lunchMenu = {

            // Hardware Accelerated Touch Drag & Drop Logic
            let draggedItem = null, sourceCol = null, activeTouchEl = null, originalSourceEl = null;
            let touchOffsetX = 0, touchOffsetY = 0;
            let lastTouch = null;
            let isMoving = false;

            const handleDragStart = (e) => { draggedItem = e.target; sourceCol = e.target.dataset.col; e.target.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; };
            const handleDragEnd = (e) => { if(e.target) e.target.classList.remove('dragging'); cleanupDrops(); };
            const handleDragOver = (e) => { e.preventDefault(); const zone = e.target.closest('.dropzone'); if(zone) zone.classList.add('dropzone-active'); };
            const handleDragLeave = (e) => { const zone = e.target.closest('.dropzone'); if(zone) zone.classList.remove('dropzone-active'); };
            const handleDrop = (e) => { e.preventDefault(); const zone = e.target.closest('.dropzone'); if (!zone || !draggedItem) return; const tId = zone.id.replace('drop-', ''); if (tId !== sourceCol) performMove(sourceCol, tId, draggedItem.dataset.id, zone); };

            const handleTouchStart = (e) => {
                const item = e.target.closest('.draggable-item'); if (!item) return;
                e.preventDefault(); // Prevents scroll conflicts on mobile
                originalSourceEl = item; 
                sourceCol = item.dataset.col;

                // Capture exact grab coordinates
                const rect = item.getBoundingClientRect();
                touchOffsetX = e.touches[0].clientX - rect.left;
                touchOffsetY = e.touches[0].clientY - rect.top;

                activeTouchEl = item.cloneNode(true); 
                activeTouchEl.classList.remove('draggable-item'); 
                activeTouchEl.classList.add('touch-dragging');
                
                // Explicitly copy dimensions so the clone doesn't collapse
                activeTouchEl.style.width = rect.width + 'px'; 
                activeTouchEl.style.height = rect.height + 'px';

                document.body.appendChild(activeTouchEl); 
                item.style.opacity = '0.2';
                
                moveTouchClone(e.touches[0]);
            };

            const moveTouchClone = (touch) => { 
                if(!activeTouchEl) return; 
                // Hardware accelerated movement (translate3d) instead of left/top CSS.
                // Shifted slightly up (-40px) so the user's finger doesn't block the student's name
                const x = touch.clientX - touchOffsetX;
                const y = touch.clientY - touchOffsetY - 40;
                activeTouchEl.style.transform = `translate3d(${x}px, ${y}px, 0) scale(1.05) rotate(2deg)`;
            };

            const handleTouchMove = (e) => {
                if (!activeTouchEl) return; 
                e.preventDefault(); 
                lastTouch = e.touches[0];

                // Use requestAnimationFrame to optimize checking for the drop zones
                if (!isMoving) {
                    isMoving = true;
                    requestAnimationFrame(() => {
                        if (!activeTouchEl || !lastTouch) { isMoving = false; return; }
                        
                        moveTouchClone(lastTouch);
                        
                        document.querySelectorAll('.dropzone').forEach(d => d.classList.remove('dropzone-active'));
                        const elemBelow = document.elementFromPoint(lastTouch.clientX, lastTouch.clientY);
                        if(elemBelow) { 
                            const zone = elemBelow.closest('.dropzone'); 
                            if(zone) zone.classList.add('dropzone-active'); 
                        }
                        isMoving = false;
                    });
                }
            };

            const handleTouchEnd = (e) => {
                if (!activeTouchEl) return; 
                e.preventDefault(); 
                
                const touch = e.changedTouches[0]; 
                const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
                
                // Cleanup cloned element
                activeTouchEl.remove(); 
                activeTouchEl = null; 
                lastTouch = null; 
                
                if(originalSourceEl) originalSourceEl.style.opacity = '1'; 
                cleanupDrops();
                
                // Handle the Drop logic
                if(elemBelow && originalSourceEl) { 
                    const zone = elemBelow.closest('.dropzone'); 
                    if(zone) { 
                        const tId = zone.id.replace('drop-', ''); 
                        if(tId !== sourceCol) performMove(sourceCol, tId, originalSourceEl.dataset.id, zone); 
                    } 
                }
            };

            const cleanupDrops = () => document.querySelectorAll('.dropzone').forEach(d => { d.classList.remove('dropzone-active', 'warping'); });

            const performMove = (fromCol, toCol, sId, zone) => {
                const student = appState.lunchColumns[fromCol].find(s => s.id === sId);
                if(student) {
                    zone.classList.add('warping');

                    if (appState.lunchColumns.unselected.length === 0 && fromCol === 'unselected') triggerConfetti();
                    setTimeout(renderLunchChoice, 400); 
                }
            };

            toolDisplay.querySelectorAll('.draggable-item').forEach(el => { el.addEventListener('dragstart', handleDragStart); el.addEventListener('dragend', handleDragEnd); el.addEventListener('touchstart', handleTouchStart, {passive: false}); el.addEventListener('touchmove', handleTouchMove, {passive: false}); el.addEventListener('touchend', handleTouchEnd); });
            toolDisplay.querySelectorAll('.dropzone').forEach(el => { el.addEventListener('dragover', handleDragOver); el.addEventListener('dragleave', handleDragLeave); el.addEventListener('drop', handleDrop); });

            document.getElementById('reset-lunch').onclick = () => { appState.lunchColumns = null; renderLunchChoice(); };
        }

                            </div>
                        </div>
                        
                        <div class="flex gap-8 items-center bg-black/50 p-5 rounded-full border border-white/10 backdrop-blur-md shadow-lg">
                            <button onclick="window.addTime(-60)" class="w-16 h-16 rounded-full bg-space-card text-white border border-white/20 font-black text-3xl hover:bg-white/10 transition-colors">-1</button>
                            <button id="timer-toggle" class="bg-neon-blue text-space-base w-24 h-24 rounded-full flex items-center justify-center border-none shadow-neon-blue transform scale-110 hover:scale-125 transition-transform">
                                <i data-lucide="play" class="w-10 h-10 fill-current ml-2"></i>
                            </button>
                            <button onclick="window.addTime(60)" class="w-16 h-16 rounded-full bg-space-card text-white border border-white/20 font-black text-3xl hover:bg-white/10 transition-colors">+1</button>
                        </div>
                        <button onclick="window.resetTimer()" class="mt-10 font-display text-xl text-slate-400 hover:text-neon-pink uppercase tracking-widest transition-colors">Abort Sequence</button>
                    </div>
                </div>
            `;

            const ring = document.getElementById('timer-ring');
            const display = document.getElementById('time-display');
            const toggleBtn = document.getElementById('timer-toggle');
            ring.setAttribute("pathLength", "100");

            const updateUI = () => {
                display.innerText = formatTime(secondsLeft);
                const pct = totalTime > 0 ? (secondsLeft / totalTime) * 100 : 0;
                ring.style.strokeDashoffset = 100 - pct;
                ring.setAttribute('stroke', pct < 20 ? '#ff0844' : pct < 50 ? '#ffe53b' : '#00f2fe');
                display.style.textShadow = `0 0 20px ${pct < 20 ? '#ff0844' : pct < 50 ? '#ffe53b' : '#00f2fe'}`;
            };

            const tick = () => {
                if (secondsLeft > 0) { secondsLeft--; updateUI(); } 
                else {
                    clearInterval(appState.timerInterval); isRunning = false;
                    toggleBtn.innerHTML = `<i data-lucide="rotate-ccw" class="w-10 h-10"></i>`;
                    toggleBtn.className = "bg-neon-pink text-white w-24 h-24 rounded-full flex items-center justify-center border-none shadow-neon-pink transform scale-110 animate-pulse-glow";
                    triggerConfetti(); lucide.createIcons();
                }
            };

            toggleBtn.onclick = () => {
                if (isRunning) {
                    clearInterval(appState.timerInterval); isRunning = false;
                    toggleBtn.innerHTML = `<i data-lucide="play" class="w-10 h-10 fill-current ml-2"></i>`;
                    toggleBtn.className = "bg-neon-blue text-space-base w-24 h-24 rounded-full flex items-center justify-center border-none shadow-neon-blue transform scale-110";
                } else {
                    if (secondsLeft === 0) { secondsLeft = totalTime || 300; }
                    appState.timerInterval = setInterval(tick, 1000); isRunning = true;
                    toggleBtn.innerHTML = `<i data-lucide="pause" class="w-10 h-10 fill-current"></i>`;
                    toggleBtn.className = "bg-neon-orange text-space-base w-24 h-24 rounded-full flex items-center justify-center border-none shadow-[0_0_20px_rgba(255,154,68,0.8)] transform scale-110";
                }
                lucide.createIcons();
            };

            window.addTime = (s) => { secondsLeft = Math.max(0, secondsLeft + s); totalTime = Math.max(totalTime, secondsLeft); updateUI(); };
            window.resetTimer = () => { clearInterval(appState.timerInterval); isRunning = false; secondsLeft = 300; totalTime = 300; toggleBtn.innerHTML = `<i data-lucide="play" class="w-10 h-10 fill-current ml-2"></i>`; toggleBtn.className = "bg-neon-blue text-space-base w-24 h-24 rounded-full flex items-center justify-center border-none shadow-neon-blue transform scale-110"; updateUI(); lucide.createIcons(); };
            
            window.showTimerSettings = () => {
                showModal(`
                    <h3 class="text-3xl font-display text-white mb-8 text-center uppercase tracking-widest text-shadow-[0_0_10px_currentColor] text-neon-blue">Set Coordinates (Minutes)</h3>
                    <div class="flex justify-center gap-5 flex-wrap mb-4">
                        ${[1,2,5,10,15,20].map(m => `<button onclick="window.setCustomTime(${m})" class="w-24 h-24 rounded-2xl bg-space-card text-white border border-white/20 font-display text-4xl hover:border-neon-blue hover:shadow-neon-blue transition-all">${m}</button>`).join('')}
                    </div>
                `);
            };
            window.setCustomTime = (m) => { secondsLeft = m * 60; totalTime = secondsLeft; updateUI(); document.getElementById('modal-container').classList.add('hidden'); };
            updateUI();
        }

        // ==========================================
        // 4. CREW MANIFEST (Roster)
        // ==========================================
        function renderClassRoster() {
            const list = appState.students.map(s => `
                <div class="glass-panel p-5 shadow-lg hover:shadow-neon-blue hover:-translate-y-2 transition-all group flex flex-col items-center justify-center h-56 relative border-t-4 border-t-neon-blue">
                    <div class="w-20 h-20 bg-black/50 border-2 border-slate-500 rounded-full flex items-center justify-center text-5xl mb-4 transform transition-transform group-hover:scale-110 group-hover:border-neon-blue drop-shadow-[0_0_10px_rgba(0,242,254,0.3)]">${getStudentEmoji(s)}</div>
                    <span class="font-display text-2xl text-white truncate w-full text-center tracking-widest uppercase">${s.name}</span>
                    <button onclick="window.removeStudent('${s.id}')" class="absolute -top-4 -right-4 w-10 h-10 bg-space-base text-neon-pink border border-neon-pink rounded-full opacity-0 group-hover:opacity-100 shadow-neon-pink transition-all hover:bg-neon-pink hover:text-white flex items-center justify-center"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
            `).join('');

            toolDisplay.innerHTML = `
                <div class="h-full flex flex-col p-6 animate-pop-in relative min-h-0">
                    <div class="flex justify-between items-center mb-8 glass-panel px-8 py-5 border-l-4 border-l-neon-purple shadow-neon-purple flex-shrink-0">
                        <h2 class="text-4xl font-display text-white flex items-center gap-4 uppercase tracking-widest"><i data-lucide="users" class="w-10 h-10 text-neon-purple"></i> Crew Manifest <span class="text-neon-blue ml-2">[${appState.students.length}]</span></h2>
                        <button onclick="window.showAddStudentModal()" class="bg-space-card text-neon-green border border-neon-green px-6 py-3 rounded-xl font-black text-xl flex items-center gap-2 uppercase tracking-widest hover:bg-neon-green hover:text-black transition-all shadow-[0_0_10px_rgba(0,255,135,0.4)]"><i data-lucide="user-plus" class="w-6 h-6"></i> Add Crew</button>
                    </div>
                    <!-- Scaled for 8-10 students perfectly -->
                    <div class="flex-grow overflow-y-auto pr-3 pb-8 custom-scrollbar min-h-0"><div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-8 max-w-7xl mx-auto">${list}</div></div>
                </div>
            `;
            
            window.showAddStudentModal = () => {
                showModal(`
                    <h3 class="text-3xl font-display text-white mb-8 text-center uppercase tracking-widest text-shadow-[0_0_10px_#fff]">Add Crew Member</h3>
                    <input type="text" id="new-student-name" class="w-full bg-space-base border-2 border-white/20 text-white rounded-xl px-6 py-4 font-display text-3xl mb-8 focus:border-neon-blue outline-none shadow-inner text-center uppercase" placeholder="Enter Name" autocomplete="off">
                    <button onclick="window.addStudent()" class="w-full bg-neon-blue text-black py-4 rounded-xl font-black text-2xl tracking-widest uppercase hover:shadow-neon-blue transition-shadow">Register</button>
                `);
                setTimeout(() => document.getElementById('new-student-name').focus(), 100);
            };

            window.addStudent = async () => {
                const name = document.getElementById('new-student-name').value.trim();
                if(!name) return;
                document.getElementById('modal-container').classList.add('hidden');
                if (appState.userId) await addDoc(collection(db, `artifacts/${appId}/users/${appState.userId}/students`), { name, isPresent: true });
                else { appState.students.push({ id: `loc-${Date.now()}`, name, isPresent: true }); renderClassRoster(); }
            };
            
            window.removeStudent = async (id) => {
                if(confirm('Discharge this crew member?')) {
                    if (appState.userId) await deleteDoc(doc(db, `artifacts/${appId}/users/${appState.userId}/students`, id));
                    else { appState.students = appState.students.filter(s => s.id !== id); renderClassRoster(); }
                }
            };
        }

        // ==========================================
        // 5. RANDOM PICKER (Teleporter)
        // ==========================================
        function renderStudentSelector() {
            const list = appState.students.map(s => `
                <div class="flex items-center justify-between p-4 mb-3 bg-space-card/80 border border-white/10 rounded-xl hover:border-neon-purple transition-all cursor-pointer shadow-md" onclick="window.toggleAttendance('${s.id}')">
                    <div class="flex items-center gap-4"><span class="text-3xl">${getStudentEmoji(s)}</span> <span class="font-display text-xl uppercase tracking-widest ${s.isPresent?'text-white':'text-slate-600 line-through'}">${s.name}</span></div>
                    <div class="w-14 h-8 rounded-full border-2 border-white/20 relative transition-colors ${s.isPresent ? 'bg-neon-green shadow-[0_0_10px_rgba(0,255,135,0.5)] border-neon-green' : 'bg-space-base'}">
                        <div class="w-5 h-5 bg-white rounded-full absolute top-[4px] transition-all ${s.isPresent ? 'left-[30px]' : 'left-[4px]'}"></div>
                    </div>
                </div>
            `).join('');

            toolDisplay.innerHTML = `
                <div class="h-full flex p-6 gap-8 animate-pop-in min-h-0">
                    <!-- Left: Status Panel -->
                    <div class="w-[350px] flex-shrink-0 flex flex-col glass-panel border-l-4 border-l-neon-purple shadow-neon-purple overflow-hidden h-full">
                        <div class="p-5 bg-black/40 border-b border-white/10 text-center font-display text-2xl text-neon-purple uppercase tracking-widest z-10 flex-shrink-0">Active Status</div>
                        <div class="overflow-y-auto flex-grow p-4 custom-scrollbar min-h-0">${list}</div>
                    </div>
                    
                    <!-- Right: Teleporter Pad -->
                    <div class="flex-grow flex flex-col items-center justify-center p-4 min-h-0">
                        <div id="selector-display" class="w-full h-full max-h-[600px] glass-panel flex flex-col items-center justify-center p-10 mb-8 relative overflow-hidden border-2 border-neon-blue">
                            
                            <!-- Teleporter Grid Background -->
                            <div class="absolute inset-0 bg-[linear-gradient(rgba(0,242,254,0.1)_1px,transparent_1px),linear-gradient(90deg,rgba(0,242,254,0.1)_1px,transparent_1px)] bg-[size:40px_40px] [transform:perspective(500px)_rotateX(60deg)] origin-bottom opacity-50"></div>
                            
                            <div id="result-content" class="text-center w-full h-full flex flex-col justify-center items-center z-10 bg-black/40 backdrop-blur-sm rounded-[32px] border border-neon-blue/30 min-h-0 overflow-hidden shadow-[inset_0_0_50px_rgba(0,242,254,0.1)]">
                                <i data-lucide="zap" class="w-32 h-32 text-neon-blue mb-6 animate-pulse-glow filter drop-shadow-[0_0_15px_rgba(0,242,254,0.8)]"></i>
                                <h2 class="text-6xl font-display text-white uppercase tracking-widest text-shadow-[0_0_15px_rgba(255,255,255,0.5)]">Awaiting Target</h2>
                            </div>
                        </div>
                        
                        <!-- Control Buttons -->
                        <div class="flex gap-6 flex-wrap justify-center flex-shrink-0">
                            <button onclick="window.pickOne()" class="bg-space-card text-neon-blue border border-neon-blue px-10 py-5 rounded-2xl font-black text-2xl flex items-center gap-3 uppercase tracking-widest hover:bg-neon-blue hover:text-black transition-all shadow-neon-blue"><i data-lucide="zap" class="w-8 h-8"></i> Beam One</button>
                            <button onclick="window.pickGroups(2)" class="bg-space-base text-white border border-white/20 px-8 py-5 rounded-2xl font-black text-xl uppercase tracking-widest hover:border-neon-purple hover:text-neon-purple transition-colors">Squads (2)</button>
                            <button onclick="window.pickGroups(4)" class="bg-space-base text-white border border-white/20 px-8 py-5 rounded-2xl font-black text-xl uppercase tracking-widest hover:border-neon-purple hover:text-neon-purple transition-colors">Platoons (4)</button>
                        </div>
                    </div>
                </div>
            `;

            window.toggleAttendance = async (id) => {
                const s = appState.students.find(st => st.id === id);
                if (appState.userId) await updateDoc(doc(db, `artifacts/${appId}/users/${appState.userId}/students`, s.id), { isPresent: !s.isPresent });
                else { s.isPresent = !s.isPresent; renderStudentSelector(); }
            };

            window.pickOne = () => {
                const pool = appState.students.filter(s => s.isPresent);
                if(!pool.length) return;
                const display = document.getElementById('result-content');
                let i = 0;
                const timer = setInterval(() => {
                    const r = pool[Math.floor(Math.random() * pool.length)];
                    display.innerHTML = `<div class="opacity-60 scale-90 filter blur-[2px]"><div class="text-[7rem] mb-2">${getStudentEmoji(r)}</div><h2 class="text-5xl font-display text-slate-500 uppercase tracking-widest">${r.name}</h2></div>`;
                    if (++i > 20) {
                        clearInterval(timer);
                        const win = pool[Math.floor(Math.random() * pool.length)];
                        display.innerHTML = `<div class="animate-pop-in bg-[radial-gradient(ellipse_at_center,rgba(0,242,254,0.4)_0%,transparent_70%)] w-full h-full rounded-[32px] flex flex-col items-center justify-center p-6"><div class="text-[12rem] mb-4 animate-float filter drop-shadow-[0_0_30px_rgba(255,255,255,0.8)]">${getStudentEmoji(win)}</div><h2 class="text-[6rem] font-display text-neon-blue uppercase tracking-widest leading-none text-shadow-[0_0_20px_currentColor] max-w-full truncate">${win.name}</h2></div>`;
                        triggerConfetti();
                    }
                }, 80);
            };

            window.pickGroups = (size) => {
                const pool = appState.students.filter(s => s.isPresent).sort(() => Math.random() - 0.5);
                const groups = []; while(pool.length) groups.push(pool.splice(0, size));
                const html = groups.map((g, i) => `
                    <div class="glass-panel p-5 border border-neon-purple shadow-[0_0_15px_rgba(177,0,255,0.2)]">
                        <div class="text-center font-black text-neon-purple bg-black/40 rounded-lg py-2 mb-4 uppercase text-lg tracking-widest border border-neon-purple/30">Unit 0${i+1}</div>
                        <div class="flex flex-col gap-3">${g.map(s => `<div class="bg-space-card border border-slate-600 p-3 rounded-xl flex items-center gap-4"><span class="text-3xl drop-shadow-md">${getStudentEmoji(s)}</span><span class="font-display text-xl text-white uppercase tracking-widest">${s.name}</span></div>`).join('')}</div>
                    </div>`).join('');
                document.getElementById('result-content').innerHTML = `<div class="w-full h-full overflow-y-auto custom-scrollbar grid grid-cols-2 lg:grid-cols-3 gap-6 p-6 items-start content-start bg-black/20 min-h-0">${html}</div>`;
                triggerConfetti();
            };
        }

        // ==========================================
        // 6. GALACTIC TOURNAMENT BRACKET
        // ==========================================
        function renderTournamentBracket() {
            if (!appState.bracket) {
                toolDisplay.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full animate-pop-in min-h-0 relative">
                        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(255,229,59,0.1)_0%,transparent_50%)] pointer-events-none"></div>
                        <div class="glass-panel p-16 max-w-3xl flex flex-col items-center border-t-4 border-t-neon-yellow shadow-neon-yellow z-10">
                            <div class="p-10 bg-black/50 border border-neon-yellow rounded-full shadow-[0_0_30px_rgba(255,229,59,0.3)] mb-10"><i data-lucide="trophy" class="w-32 h-32 text-neon-yellow filter drop-shadow-[0_0_10px_currentColor]"></i></div>
                            <h2 class="text-6xl font-display text-white mb-12 uppercase tracking-widest text-shadow-[0_0_15px_rgba(255,255,255,0.5)]">Galactic Cup</h2>
                            <button onclick="window.genBracket()" class="bg-space-card text-neon-yellow border border-neon-yellow px-14 py-6 rounded-2xl font-black text-3xl flex items-center gap-4 uppercase tracking-widest hover:bg-neon-yellow hover:text-black transition-all shadow-neon-yellow"><i data-lucide="git-branch" class="w-10 h-10"></i> Generate Matrix</button>
                        </div>
                    </div>`;
                return;
            }

            const renderMatch = (m) => {
                const p1 = m.players[0], p2 = m.players[1], wId = m.winner?.id;
                const rP = (p) => {
                    if(!p) return '<div class="h-16 bg-space-base border border-white/10 rounded-xl mb-3 flex items-center px-4"><span class="text-slate-600 font-display text-lg uppercase tracking-widest">Awaiting...</span></div>';
                    if(p.id === 'bye') return '<div class="h-16 flex items-center px-4"><span class="text-slate-600 font-display text-lg uppercase tracking-widest">BYE</span></div>';
                    const isW = wId === p.id, isL = wId && wId !== p.id, canClick = !wId;
                    return `
                        <div ${canClick ? `onclick="window.advBracket('${m.id}', '${p.id}')"` : ''} 
                             class="h-16 flex items-center px-4 rounded-xl border-2 mb-3 cursor-pointer transition-all select-none
                             ${isW ? 'bg-neon-green/10 border-neon-green text-white font-black shadow-[0_0_15px_rgba(0,255,135,0.3)]' : isL ? 'bg-space-base border-white/10 text-slate-500 opacity-50' : 'bg-space-card border-slate-600 hover:border-neon-yellow hover:bg-black/50 text-white font-bold uppercase tracking-widest'}">
                             <span class="text-3xl mr-4 drop-shadow-md">${getStudentEmoji(p)}</span><span class="truncate text-xl font-display">${p.name}</span>
                        </div>`;
                };
                return `<div class="w-[340px] glass-panel p-4 mb-10 relative border-l-4 ${m.winner ? 'border-l-neon-green' : 'border-l-slate-600'}">
                           <div class="absolute -left-6 top-1/2 w-6 h-1 ${m.winner ? 'bg-neon-green' : 'bg-slate-600'}"></div>
                           ${rP(p1)}<div class="h-px bg-white/10 my-3"></div>${rP(p2)}
                        </div>`;
            };

            const wbMatches = appState.bracket.matches.filter(m => m.type === 'winner' || m.type === 'final');
            
            toolDisplay.innerHTML = `
                <div class="h-full flex flex-col overflow-hidden min-h-0">
                    <div class="p-6 glass-panel border-x-0 border-t-0 rounded-none flex justify-between items-center z-10 flex-shrink-0">
                        <h2 class="font-display text-3xl text-white flex items-center gap-4 uppercase tracking-widest"><i data-lucide="trophy" class="w-8 h-8 text-neon-yellow drop-shadow-[0_0_10px_currentColor]"></i> Tournament Matrix</h2>
                        <button onclick="appState.bracket=null;renderTournamentBracket()" class="text-neon-pink bg-space-base border border-neon-pink px-6 py-2 rounded-xl uppercase tracking-widest text-lg font-black hover:bg-neon-pink hover:text-white transition-colors shadow-[0_0_10px_rgba(255,8,68,0.3)]">Reset Matrix</button>
                    </div>
                    <div class="flex-grow overflow-auto p-10 custom-scrollbar relative z-0 min-h-0 bg-[linear-gradient(rgba(255,255,255,0.02)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.02)_1px,transparent_1px)] bg-[size:40px_40px]">
                        <div class="flex gap-20 min-w-max">
                            <div class="flex flex-col gap-4">
                                <h3 class="font-display text-neon-blue bg-black/50 border border-neon-blue px-6 py-2 rounded-lg w-max tracking-widest text-xl mb-8 uppercase shadow-[0_0_10px_rgba(0,242,254,0.3)]">Quarterfinals</h3>
                                ${wbMatches.map(m => renderMatch(m)).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            window.genBracket = () => {
                const pool = appState.students.filter(s => s.isPresent).sort(()=>Math.random()-0.5);
                if(pool.length < 2) return alert("Need more students!");
                const matches = []; let size=2; while(size<pool.length) size*=2;
                while(pool.length < size) pool.push({id:'bye', name:'BYE'});
                for(let i=0; i<size/2; i++) matches.push({ id:`M${i+1}`, type:'winner', players:[pool[i], pool[size-1-i]], winner:null });
                appState.bracket = { matches };
                matches.forEach(m => { if(m.players[1].id==='bye') window.advBracket(m.id, m.players[0].id, true); });
                renderTournamentBracket();
            };

            window.advBracket = (mId, wId, silent=false) => {
                const m = appState.bracket.matches.find(x => x.id === mId);
                if(!m || m.winner) return;
                m.winner = m.players.find(p => p.id === wId);
                if(!silent) { triggerConfetti(); renderTournamentBracket(); }
            };
        }

        // ==========================================
        // Helpers
        // ==========================================
        function triggerConfetti() {
            const emojis = ['✨','🚀','☄️','💫','🌟','👨‍🚀','🛸','👽'];
            for(let i=0; i<60; i++) {
                const c = document.createElement('div');
                c.className = 'fixed z-[100] pointer-events-none text-[3rem] md:text-[4rem] filter drop-shadow-[0_0_15px_#fff]';
                c.innerText = emojis[Math.floor(Math.random()*emojis.length)];
                c.style.left = (Math.random() * 100) + 'vw'; 
                c.style.top = '100vh';
                document.body.appendChild(c);
                const anim = c.animate([
                    { transform: `translateY(0) rotate(0deg) scale(0.5)`, opacity: 1 }, 
                    { transform: `translateY(-${110 + Math.random()*20}vh) rotate(${720 * (Math.random()>0.5?1:-1)}deg) scale(1.5)`, opacity: 0 }
                ], { duration: 2000 + Math.random()*2000, easing: 'cubic-bezier(0.25, 1, 0.5, 1)' });
                anim.onfinish = () => c.remove();
            }
        }

        function setupFullscreen() {
            document.getElementById('fullscreen-btn').onclick = () => {
                if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
                else document.exitFullscreen();
            };
        }

        init();
    </script>
</body>
</html>
